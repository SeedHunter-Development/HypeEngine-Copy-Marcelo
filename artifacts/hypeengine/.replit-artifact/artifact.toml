kind = "web"
previewPath = "/"
title = "HypeEngine"
version = "1.0.0"
id = "artifacts/hypeengine"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 25387
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/hypeengine run dev"

[services.env]
PORT = "25387"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/hypeengine", "run", "build"]
publicDir = "artifacts/hypeengine/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
